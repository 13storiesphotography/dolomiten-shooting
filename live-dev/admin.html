<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101010" />
  <meta name="color-scheme" content="dark" />
  <title>Admin · Dolomiten Shooting</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f0f0d;
      --text: #f7f1e8;
      --muted: rgba(247,241,232,.66);
      --line: rgba(247,241,232,.16);
      --accent: #d8b16a;
      --danger: #d96c6c;
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; background: #101010; color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { min-height: 100vh; background: radial-gradient(circle at 20% 0%, rgba(216,177,106,.18), transparent 30%), linear-gradient(180deg, #151411, #090907); }

    .wrap { width: min(1080px, 100%); margin: 0 auto; padding: max(24px, env(safe-area-inset-top)) clamp(16px, 4vw, 34px) 48px; }
    header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 22px; }
    .eyebrow { color: var(--accent); letter-spacing: .16em; text-transform: uppercase; font-size: .72rem; font-weight: 900; }
    h1 { margin: 8px 0 0; font-size: clamp(2.2rem, 8vw, 5rem); line-height: .9; letter-spacing: -.06em; }
    .status { color: var(--muted); font-size: .9rem; margin-top: 10px; line-height: 1.45; }

    .card, details { border: 1px solid var(--line); background: rgba(255,255,255,.07); border-radius: var(--radius); box-shadow: 0 18px 55px rgba(0,0,0,.32); }
    .card { padding: 18px; }
    .login { width: min(460px, 100%); margin-top: 26px; }

    label { display: block; color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .12em; font-weight: 900; margin: 0 0 7px; }
    input, textarea, select { width: 100%; min-height: 44px; border: 1px solid var(--line); border-radius: 14px; background: rgba(0,0,0,.22); color: var(--text); padding: 10px 12px; font: inherit; outline: none; }
    textarea { min-height: 76px; resize: vertical; }
    input:focus, textarea:focus, select:focus { border-color: rgba(216,177,106,.55); }
    select option { background: #171715; color: var(--text); }

    .grid { display: grid; gap: 12px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .field { min-width: 0; }

    .btn { min-height: 44px; border: 1px solid var(--line); border-radius: 14px; padding: 0 14px; display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,.07); color: var(--text); font-weight: 900; cursor: pointer; }
    .btn.primary { background: linear-gradient(135deg, #f0d596, var(--accent)); color: #17130c; border: 0; }
    .btn.danger { color: #fff; border-color: rgba(217,108,108,.35); background: rgba(217,108,108,.16); }
    .btnbar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

    .shootings { display: grid; gap: 16px; margin-top: 22px; }
    details { overflow: hidden; background: rgba(255,255,255,.055); }
    summary { cursor: pointer; padding: 16px 18px; display: flex; justify-content: space-between; gap: 12px; align-items: center; list-style: none; }
    summary::-webkit-details-marker { display: none; }
    .summary-main { min-width: 0; }
    .summary-title { font-weight: 950; font-size: 1.08rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .summary-sub { color: var(--muted); font-size: .9rem; margin-top: 4px; }
    .summary-day { color: var(--accent); font-weight: 900; white-space: nowrap; }
    .editor { padding: 0 18px 18px; }
    .section-title { color: var(--accent); letter-spacing: .12em; text-transform: uppercase; font-size: .72rem; font-weight: 900; margin: 18px 0 10px; }
    .hint { color: var(--muted); font-size: .88rem; line-height: 1.45; }
    .error-box { border: 1px solid rgba(217,108,108,.35); background: rgba(217,108,108,.12); color: #ffdede; border-radius: 16px; padding: 12px; margin-top: 12px; font-size: .9rem; line-height: 1.45; }
    .hidden { display: none !important; }

    @media (max-width: 720px) {
      header { flex-direction: column; }
      .grid.two, .grid.three { grid-template-columns: 1fr; }
      summary { align-items: flex-start; flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <div class="eyebrow">13 Stories Photography</div>
        <h1>Admin</h1>
        <div class="status" id="status">Initialisiere…</div>
      </div>
      <button class="btn danger hidden" id="logoutBtn">Abmelden</button>
    </header>

    <section class="card login" id="loginBox">
      <div class="grid">
        <div class="field"><label for="email">E-Mail</label><input id="email" type="email" autocomplete="email" /></div>
        <div class="field"><label for="password">Passwort</label><input id="password" type="password" autocomplete="current-password" /></div>
        <button class="btn primary" id="loginBtn">Einloggen</button>
        <div class="hint">Nutze den User, den du in Supabase unter Authentication angelegt hast.</div>
        <div class="error-box hidden" id="errorBox"></div>
      </div>
    </section>

    <section id="adminBox" class="hidden">
      <div class="card">
        <div class="eyebrow">Live Daten</div>
        <div class="hint" style="margin-top:8px;">Wetter wird automatisch aus dem Wetter-Ort berechnet. Das Feld „Wetter Pill“ musst du nicht mehr pflegen.</div>
        <div class="btnbar"><button class="btn primary" id="reloadBtn">Daten neu laden</button></div>
      </div>
      <div class="shootings" id="shootings"></div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = 'https://hidqxungaqlzyzsxjfqb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_sbU-WVaWQh4x_vC14dnd6w_otutO8f8';

    const statusEl = document.getElementById('status');
    const errorBox = document.getElementById('errorBox');
    const loginBox = document.getElementById('loginBox');
    const adminBox = document.getElementById('adminBox');
    const shootingsEl = document.getElementById('shootings');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const reloadBtn = document.getElementById('reloadBtn');

    let db = null;

    const weatherOptions = [
      ['val-di-funes', 'Val di Funes'],
      ['seiser-alm', 'Seiser Alm'],
      ['langental', 'Langental'],
      ['groedner-joch', 'Grödner Joch'],
      ['lago-pian', 'Lago Pian Da Mur'],
      ['passo-pordoi', 'Passo Pordoi']
    ];

    const simpleFields = [
      ['sort_order', 'Reihenfolge', 'number'],
      ['day_label', 'Tag', 'text'],
      ['date_label', 'Datum', 'text'],
      ['title', 'Titel', 'text'],
      ['subtitle', 'Untertitel / Mood', 'text'],
      ['badges', 'Badges, kommagetrennt', 'textarea']
    ];

    const timeFields = [
      ['meeting_time', 'Treffzeit', 'text'],
      ['shooting_time', 'Shootingzeit', 'text'],
      ['route_after', 'Fahrt danach', 'text']
    ];

    const placeFields = [
      ['meeting_place', 'Treffpunkt', 'text'],
      ['location_name', 'Location', 'text'],
      ['weather_id', 'Wetter-Ort', 'select']
    ];

    const linkFields = [
      ['meeting_link', 'Treffpunkt Link', 'url'],
      ['location_link', 'Location Link', 'url'],
      ['image_url', 'Bild URL', 'url']
    ];

    const allEditableKeys = [...simpleFields, ...timeFields, ...placeFields, ...linkFields].map(([key]) => key);

    function setStatus(message) { statusEl.textContent = message; }
    function showError(message) { errorBox.textContent = message; errorBox.classList.remove('hidden'); }
    function clearError() { errorBox.textContent = ''; errorBox.classList.add('hidden'); }

    function formatSupabaseError(error) {
      if (!error) return 'Unbekannter Fehler';
      return [error.message, error.code ? 'Code: ' + error.code : '', error.details ? 'Details: ' + error.details : '', error.hint ? 'Hint: ' + error.hint : ''].filter(Boolean).join(' · ');
    }

    function runSelfTests() {
      const tests = [
        { name: 'Supabase SDK geladen', pass: !!window.supabase && typeof window.supabase.createClient === 'function' },
        { name: 'Supabase URL gesetzt', pass: /^https:\/\/.+\.supabase\.co$/.test(SUPABASE_URL) },
        { name: 'Publishable Key gesetzt', pass: SUPABASE_KEY.startsWith('sb_publishable_') || SUPABASE_KEY.startsWith('eyJ') }
      ];
      const failed = tests.filter(test => !test.pass);
      if (failed.length) throw new Error('Admin Selbsttest fehlgeschlagen: ' + failed.map(test => test.name).join(', '));
    }

    function initSupabase() {
      runSelfTests();
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    function escapeHtml(value = '') {
      return String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
    }

    function valueForInput(row, key) {
      const value = row[key];
      if (Array.isArray(value)) return value.join(', ');
      return value ?? '';
    }

    function renderField(row, [key, label, type]) {
      const value = escapeHtml(valueForInput(row, key));
      if (type === 'textarea') return `<div class="field"><label>${label}</label><textarea name="${key}">${value}</textarea></div>`;
      if (type === 'select') {
        const options = weatherOptions.map(([id, name]) => `<option value="${escapeHtml(id)}" ${row[key] === id ? 'selected' : ''}>${escapeHtml(name)}</option>`).join('');
        return `<div class="field"><label>${label}</label><select name="${key}">${options}</select></div>`;
      }
      return `<div class="field"><label>${label}</label><input name="${key}" type="${type}" value="${value}" /></div>`;
    }

    function renderGroup(title, row, fields, columns = 'two') {
      return `<div class="section-title">${title}</div><div class="grid ${columns}">${fields.map(field => renderField(row, field)).join('')}</div>`;
    }

    async function loadShootings() {
      clearError();
      setStatus('Daten werden geladen…');
      const { data, error } = await db.from('shootings').select('*').order('sort_order', { ascending: true });
      if (error) { setStatus('Fehler beim Laden'); showError('Fehler beim Laden: ' + formatSupabaseError(error)); return; }
      shootingsEl.innerHTML = (data || []).map(renderEditor).join('');
      shootingsEl.querySelectorAll('form').forEach(form => form.addEventListener('submit', saveForm));
      setStatus((data || []).length + ' Einträge geladen');
    }

    function renderEditor(row) {
      return `
        <details>
          <summary>
            <div class="summary-main">
              <div class="summary-title">${escapeHtml(row.title)}</div>
              <div class="summary-sub">${escapeHtml(row.meeting_time || 'TBA')} · ${escapeHtml(row.meeting_place || 'TBA')}</div>
            </div>
            <div class="summary-day">${escapeHtml(row.day_label)} · ${escapeHtml(row.date_label)}</div>
          </summary>
          <div class="editor">
            <form data-id="${escapeHtml(row.id)}">
              ${renderGroup('Basis', row, simpleFields, 'two')}
              ${renderGroup('Zeiten', row, timeFields, 'three')}
              ${renderGroup('Orte & Wetter', row, placeFields, 'three')}
              ${renderGroup('Links & Bild', row, linkFields, 'two')}
              <div class="btnbar"><button class="btn primary" type="submit">Speichern</button></div>
            </form>
          </div>
        </details>
      `;
    }

    async function saveForm(event) {
      event.preventDefault();
      clearError();
      const form = event.currentTarget;
      const id = form.dataset.id;
      const formData = new FormData(form);
      const payload = {};

      allEditableKeys.forEach(key => {
        const raw = formData.get(key);
        if (key === 'badges') payload[key] = String(raw || '').split(',').map(x => x.trim()).filter(Boolean);
        else if (key === 'sort_order') payload[key] = Number(raw || 0);
        else payload[key] = raw || null;
      });

      payload.updated_at = new Date().toISOString();
      setStatus('Speichere ' + id + '…');
      const { error } = await db.from('shootings').update(payload).eq('id', id);
      if (error) { setStatus('Fehler beim Speichern'); showError('Fehler beim Speichern: ' + formatSupabaseError(error)); return; }
      setStatus('Gespeichert: ' + id);
      await loadShootings();
    }

    loginBtn.addEventListener('click', async () => {
      clearError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Bitte E-Mail und Passwort eingeben.'); return; }
      setStatus('Login läuft…');
      loginBtn.disabled = true;
      const { error } = await db.auth.signInWithPassword({ email, password });
      loginBtn.disabled = false;
      if (error) { setStatus('Login fehlgeschlagen'); showError('Login fehlgeschlagen: ' + error.message); return; }
      await boot();
    });

    logoutBtn.addEventListener('click', async () => { await db.auth.signOut(); await boot(); });
    reloadBtn.addEventListener('click', loadShootings);

    async function boot() {
      clearError();
      const { data, error } = await db.auth.getSession();
      if (error) { setStatus('Session Fehler'); showError('Session Fehler: ' + error.message); return; }
      const session = data.session;
      loginBox.classList.toggle('hidden', !!session);
      adminBox.classList.toggle('hidden', !session);
      logoutBtn.classList.toggle('hidden', !session);
      if (!session) { setStatus('Nicht angemeldet'); return; }
      setStatus('Angemeldet als ' + session.user.email);
      await loadShootings();
    }

    try { initSupabase(); boot(); }
    catch (error) { setStatus('Admin konnte nicht starten'); showError(error.message + ' · Prüfe, ob der Supabase Script-Tag korrekt geladen wird.'); console.error(error); }
  </script>
</body>
</html>
